<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>1987 DALTOKKI</title>
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <meta name="theme-color" content="#0f172a"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=Roboto+Mono:wght@500;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; touch-action: manipulation; overflow-x: hidden; width: 100%; }
        .record-font { font-family: 'Roboto Mono', monospace; font-variant-numeric: tabular-nums; }
        /* 💡 입력창 자동 확대 방지를 위한 폰트 사이즈 고정 (16px 이상) */
        input, select, textarea { font-size: 16px !important; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .dot-red { height: 5px; width: 5px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-top: 2px; }
        .dot-blue { height: 5px; width: 5px; background-color: #3b82f6; border-radius: 50%; display: inline-block; margin-top: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="date"] { position: relative; }
        input[type="date"]::before { content: "📅 대회 날짜 선택하기"; position: absolute; left: 1rem; color: #94a3b8; width: 80%; pointer-events: none; }
        input[type="date"]:focus::before, input[type="date"]:valid::before { display: none; }
        .scroll-mt-4 { scroll-margin-top: 1rem; }
        .tab-active { border-bottom: 3px solid #facc15; color: #facc15 !important; }
        .sort-active { background-color: #facc15; color: #0f172a !important; border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
        .min-px { padding-left: 2px !important; padding-right: 2px !important; }
        table { width: 100%; border-spacing: 0; border-collapse: collapse; table-layout: fixed !important; }
    </style>
</head>
<body class="pb-10 text-left overflow-x-hidden">

    <header class="bg-slate-900 text-white px-6 py-4 rounded-none shadow-xl font-bold flex justify-between items-end overflow-hidden">
        <div>
            <div onclick="location.reload()" class="cursor-pointer mb-1 text-left">
                <h1 class="text-2xl font-black italic tracking-tighter text-yellow-400 leading-none whitespace-nowrap">1987 DALTOKKI</h1>
            </div>
            <p class="text-slate-400 text-[8px] uppercase tracking-tight font-bold whitespace-nowrap">
                <span onclick="checkAdminPassword()" class="cursor-default text-slate-400">When</span> The Moon Rises, We Run
            </p>
        </div>
        <button onclick="openRecordRoom()" class="bg-yellow-400 text-slate-900 px-4 py-2 rounded-lg text-[11px] font-black uppercase shadow-lg mb-1">기록실</button>
    </header>

    <section class="mt-4 px-4 overflow-hidden">
        <div class="flex space-x-3 overflow-x-auto pb-2 no-scrollbar scroll-smooth" id="major-races"></div>
    </section>

    <section class="mx-4 bg-white rounded-[1rem] shadow-sm p-5 mt-1 border border-slate-100 font-bold overflow-hidden">
        <div class="flex justify-between items-center mb-5 gap-2 text-left">
            <h2 id="calendar-title" class="font-black text-lg text-slate-800 tracking-tight shrink-0">Schedule</h2>
            <div class="flex items-center justify-center gap-1.5">
                <button onclick="moveMonth(-1)" class="text-yellow-500 px-1 text-xl font-bold">◀</button>
                <select id="month-select" onchange="changeMonth()" class="bg-slate-50 text-slate-800 border-none rounded-lg px-2.5 py-1.5 outline-none text-sm font-black text-center shadow-inner"></select>
                <button onclick="moveMonth(1)" class="text-yellow-500 px-1 text-xl font-bold">▶</button>
            </div>
            <button onclick="openRaceModal()" class="bg-yellow-400 text-slate-900 px-3 py-1.5 rounded-full text-[9px] font-black shadow-md uppercase tracking-tighter shrink-0">Add Race</button>
        </div>
        <div class="calendar-grid text-center text-[10px] font-bold text-slate-300 mb-3 uppercase tracking-widest text-xs font-black">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-days" class="calendar-grid text-center gap-y-4 text-base font-black text-slate-600"></div>
    </section>

    <section id="day-detail" class="px-4 mt-4 hidden text-left">
        <h3 id="selected-date-label" class="text-[10px] font-black text-slate-400 mb-2 px-2 uppercase tracking-widest font-bold">Event Date</h3>
        <div id="race-list-for-day" class="space-y-4"></div>
    </section>

    <div id="record-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[60] flex flex-col text-left">
        <div class="bg-slate-900 text-white px-6 py-3 pb-1 rounded-none">
            <div class="flex justify-between items-center mb-1.5">
                <h2 class="text-2xl font-black italic text-yellow-400">HALL OF FAME</h2>
                <button onclick="closeRecordRoom()" class="text-slate-400 text-2xl">×</button>
            </div>
            <div class="flex justify-between items-end">
                <div class="flex gap-6 text-[15px] font-black text-slate-400 overflow-x-auto no-scrollbar whitespace-nowrap pb-2" id="record-tabs">
                    <button onclick="changeRecordTab('pb')" id="tab-pb" class="tab-active">Personal Best</button>
                    <button onclick="changeRecordTab('sub3')" id="tab-sub3" class="text-yellow-500">Sub-3 👑</button>
                </div>
                <button onclick="openAddRecordModal()" class="bg-yellow-400 text-slate-900 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-lg mb-2 shrink-0 ml-4">기록 추가</button>
            </div>
        </div>
        <div class="flex-1 overflow-auto bg-white p-2">
            <div class="px-2 mb-2">
                <span id="record-count-label" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Total Runners: 0</span>
                <div id="marathon-stats" class="mt-1 flex flex-wrap gap-x-3 gap-y-1 text-[10px] font-black text-slate-500 border-t border-slate-50 pt-2"></div>
            </div>
            <table class="w-full text-left border-collapse border-none mt-2">
                <thead>
                    <tr class="text-[10px] text-slate-400 border-b border-slate-100 font-black">
                        <th class="py-3 cursor-pointer min-px w-[95px]" onclick="sortRecords('name')"><span id="sort-name" class="whitespace-nowrap">Rank Name ↕</span></th>
                        <th class="py-3 cursor-pointer min-px text-center w-[55px]" onclick="sortRecords('5k')"><span id="sort-5k">5K ↕</span></th>
                        <th class="py-3 cursor-pointer min-px text-center w-[55px]" onclick="sortRecords('10k')"><span id="sort-10k">10K ↕</span></th>
                        <th class="py-3 cursor-pointer min-px text-center w-[65px]" onclick="sortRecords('half')"><span id="sort-half">Half ↕</span></th>
                        <th class="py-3 cursor-pointer min-px text-center w-[65px]" onclick="sortRecords('full')"><span id="sort-full" class="sort-active">Full ↕</span></th>
                        <th class="py-3 text-center min-px w-[60px]" id="th-action"></th>
                    </tr>
                </thead>
                <tbody id="record-body" class="text-sm font-bold text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <div id="add-record-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-[70] flex items-center justify-center p-6 text-left font-bold"><div class="bg-white w-full max-w-sm rounded-[1rem] p-8 shadow-2xl text-left"><h2 id="rec-modal-title" class="text-xl font-black mb-6 text-slate-800 uppercase">PB 기록 추가</h2><input type="text" id="rec-name" placeholder="이름을 입력하세요" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none font-bold shadow-inner text-[16px]"><div class="grid grid-cols-2 gap-3 mb-6"><input type="text" id="rec-5k" placeholder="5K (00:00)" oninput="formatRecord(this, 'short')" class="bg-slate-50 border-none p-3 rounded-lg outline-none text-[16px] shadow-inner record-font font-bold"><input type="text" id="rec-10k" placeholder="10K (00:00)" oninput="formatRecord(this, 'short')" class="bg-slate-50 border-none p-3 rounded-lg outline-none text-[16px] shadow-inner record-font font-bold"><input type="text" id="rec-half" placeholder="Half (0:00:00)" oninput="formatRecord(this, 'long')" class="bg-slate-50 border-none p-3 rounded-lg outline-none text-[16px] shadow-inner record-font font-bold"><input type="text" id="rec-full" placeholder="Full (0:00:00)" oninput="formatRecord(this, 'long')" class="bg-slate-50 border-none p-3 rounded-lg outline-none text-[16px] shadow-inner record-font font-bold"></div><div class="flex gap-3"><button onclick="closeAddRecordModal()" class="flex-1 py-4 font-black text-slate-400 text-sm uppercase">Cancel</button><button onclick="saveUserRecord()" class="flex-1 bg-yellow-400 text-slate-900 py-4 rounded-xl font-black shadow-lg text-sm uppercase">Save</button></div></div></div>
    
    <div id="admin-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-50 flex items-center justify-center p-6 text-left font-bold"><div class="bg-white w-full max-w-md rounded-[1rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto"><h2 class="text-xl font-black mb-4 text-slate-800 uppercase">Data Manager</h2><textarea id="bulk-json-input" placeholder='JSON data...' class="w-full h-48 bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-[10px] font-mono shadow-inner"></textarea><div class="grid grid-cols-2 gap-3 mb-6 font-black"><button onclick="importData()" class="bg-slate-900 text-white py-4 rounded-xl shadow-lg">Import</button><button onclick="exportData()" class="bg-yellow-400 text-slate-900 py-4 rounded-xl shadow-lg">Export</button></div><button onclick="closeAdminModal()" class="w-full py-2 font-black text-slate-400 uppercase text-xs">Close</button></div></div>
    <div id="race-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-50 flex items-center justify-center p-6 text-left font-bold"><div class="bg-white w-full max-w-sm rounded-[1rem] p-8 shadow-2xl font-bold text-left"><h2 id="race-modal-title" class="text-xl font-black mb-6 text-slate-800 uppercase">New Race</h2><input type="text" id="new-race-name" placeholder="대회 명칭" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-[16px] font-bold shadow-inner"><input type="text" id="new-race-url" placeholder="대회 홈페이지 (URL)" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-[16px] font-bold shadow-inner"><input type="text" id="new-chat-url" placeholder="오픈채팅방 URL" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-[16px] font-bold shadow-inner"><input type="date" id="new-race-date" required class="w-full bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-[16px] font-black shadow-inner"><div class="flex flex-wrap gap-2 mb-6" id="course-checks"><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="5K"> 5K</label><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="10K"> 10K</label><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="Half"> Half</label><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="Full"> Full</label><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="Trail"> Trail</label><label class="bg-slate-50 px-2 py-2 rounded-lg text-[10px] font-black"><input type="checkbox" value="기타"> 기타</label></div><div class="flex gap-3 font-black"><button onclick="closeRaceModal()" class="flex-1 py-4 text-slate-400 text-sm uppercase">Cancel</button><button onclick="saveRace()" class="flex-1 bg-slate-900 text-white rounded-xl shadow-lg text-sm uppercase">Save</button></div></div></div>
    <div id="join-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-50 flex items-center justify-center p-6 text-left font-bold"><div class="bg-white w-full max-w-sm rounded-[1rem] p-8 shadow-2xl border-white/20"><h2 id="join-race-title" class="text-xl font-black mb-1 text-slate-800">Runner Info</h2><p id="join-race-date" class="text-xs text-slate-400 mb-6 font-black"></p><input type="text" id="user-name" placeholder="이름" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-[16px] font-bold shadow-inner"><div class="flex gap-8 mb-6 font-black text-sm"><label><input type="radio" name="gender" value="남" checked class="accent-slate-900"> 남성</label><label><input type="radio" name="gender" value="여" class="accent-slate-900"> 여성</label></div><select id="user-course" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-8 outline-none text-slate-500 font-black shadow-inner text-[16px]"></select><div class="flex gap-3 font-black"><button onclick="closeJoinModal()" class="flex-1 py-4 font-black text-slate-400 text-sm uppercase">Cancel</button><button onclick="addParticipant()" class="flex-1 bg-yellow-400 text-slate-900 rounded-xl shadow-lg text-sm uppercase">Register</button></div></div></div>

    <script>
        const DB_URL = "https://runcal-80d30-default-rtdb.firebaseio.com"; 
        const MASTER_PW = "1987";
        const ADMIN_PW = "0248";

        let allData = { races: {}, participants: {}, records: {} };
        let currentYear = 2026;
        let currentMonth = new Date().getMonth() + 1;
        let selectedDate = null;
        let currentRecordTab = 'pb';
        let sortKey = 'full';
        let sortDir = 1;

        window.onload = () => { initMonthSelect(); fetchData(); };

        function isSameDate(dateA, dateB) {
            if (!dateA || !dateB) return false;
            const norm = (d) => d.split('-').map(v => parseInt(v)).join('-');
            return norm(dateA) === norm(dateB);
        }

        async function fetchData() {
            try {
                const res = await fetch(`${DB_URL}/.json?t=${Date.now()}`);
                const data = await res.json();
                allData = data || { races: {}, participants: {}, records: {} };
                renderAll();
                if(selectedDate) showDayDetail(selectedDate, false);
                if(!document.getElementById('record-modal').classList.contains('hidden')) renderRecords();
            } catch(e) { console.error("Fetch error", e); }
        }

        function openRecordRoom() { changeRecordTab('pb'); document.getElementById('record-modal').classList.remove('hidden'); }
        function closeRecordRoom() { document.getElementById('record-modal').classList.add('hidden'); }
        function changeRecordTab(tab) { currentRecordTab = tab; document.querySelectorAll('#record-tabs button').forEach(b => b.classList.remove('tab-active')); document.getElementById('tab-' + tab).classList.add('tab-active'); renderRecords(); }
        
        function timeToSeconds(timeStr) { 
            if (!timeStr || timeStr === '-' || timeStr.trim() === '') return 999999999; 
            const parts = timeStr.split(':').map(Number); 
            if (parts.length === 2) return parts[0] * 60 + parts[1]; 
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2]; 
            return 999999999; 
        }
        
        function getUnifiedPBData() {
            const unified = {};
            const keys = ["pb", "2026", "2025", "prev"];
            keys.forEach(yr => {
                const records = allData.records?.[yr];
                if (records) {
                    Object.entries(records).forEach(([rawName, rec]) => {
                        const name = rawName.trim();
                        if (!unified[name]) { unified[name] = { ...rec }; }
                        else {
                            ["5k", "10k", "half", "full"].forEach(k => {
                                if (rec[k] !== "-" && (unified[name][k] === "-" || timeToSeconds(rec[k]) < timeToSeconds(unified[name][k]))) { unified[name][k] = rec[k]; }
                            });
                        }
                    });
                }
            });
            return Object.entries(unified).map(([name, rec]) => ({ name, ...rec }));
        }

        function updateMarathonStats(data) {
            const statsContainer = document.getElementById('marathon-stats');
            if (currentRecordTab === 'sub3' || data.length === 0) { statsContainer.innerHTML = ''; statsContainer.classList.add('hidden'); return; }
            statsContainer.classList.remove('hidden');
            let sub3 = 0, single = 0, sub330 = 0, sub4 = 0;
            data.forEach(r => {
                const sec = timeToSeconds(r.full);
                if (sec <= 10799) sub3++; else if (sec <= 11399) single++; else if (sec <= 12599) sub330++; else if (sec <= 14399) sub4++; 
            });
            const getPer = (num) => Math.round((num / data.length) * 100);
            statsContainer.innerHTML = `<span>SUB3: <b class="text-slate-800">${sub3}명 (${getPer(sub3)}%)</b></span><span>싱글: <b class="text-slate-800">${single}명 (${getPer(single)}%)</b></span><span>SUB330: <b class="text-slate-800">${sub330}명 (${getPer(sub330)}%)</b></span><span>SUB4: <b class="text-slate-800">${sub4}명 (${getPer(sub4)}%)</b></span>`;
        }

        function renderRecords() { 
            const body = document.getElementById('record-body'); body.innerHTML = '';
            let dataToShow = getUnifiedPBData();
            const isSub3View = (currentRecordTab === 'sub3');
            
            if (isSub3View) {
                dataToShow = dataToShow.filter(r => timeToSeconds(r.full) <= 10799);
                document.getElementById('record-count-label').innerText = `SUB3 Runners: ${dataToShow.length} 👑`;
                document.getElementById('th-action').style.display = 'none';
            } else {
                document.getElementById('record-count-label').innerText = `Total Runners: ${dataToShow.length}`;
                document.getElementById('th-action').style.display = 'table-cell';
            }
            
            updateMarathonStats(dataToShow);
            document.querySelectorAll('th span').forEach(el => el.classList.remove('sort-active'));
            document.getElementById('sort-' + sortKey).classList.add('sort-active');

            dataToShow.sort((a, b) => { 
                let valA = a[sortKey] || "-"; let valB = b[sortKey] || "-"; 
                if (sortKey === 'name') return valA.localeCompare(valB, 'ko') * sortDir; 
                return (timeToSeconds(valA) - timeToSeconds(valB)) * sortDir; 
            }); 

            dataToShow.forEach((r, idx) => {
                let rankNum = idx + 1;
                let rankLabel = (sortDir === 1 && rankNum <= 3) ? (rankNum === 1 ? "🥇" : rankNum === 2 ? "🥈" : "🥉") : `<span class="text-[12px] text-slate-500 record-font w-5 inline-block text-center">${rankNum}</span>`;
                const actionBtns = isSub3View ? '' : `<td class="py-4 text-center min-px"><div class="flex gap-1 justify-center"><button onclick="editAnyPBRecord('${r.name}')" class="text-blue-500 text-[10px] font-black uppercase">EDIT</button><button onclick="deleteAnyPBRecord('${r.name}')" class="text-red-400 text-[10px] font-black uppercase">DEL</button></div></td>`;
                body.innerHTML += `<tr class="border-b border-slate-50"><td class="py-4 text-slate-900 min-px truncate"><span class="mr-1">${rankLabel}</span>${r.name}</td><td class="py-4 text-slate-500 record-font text-[12px] min-px text-center">${r["5k"]}</td><td class="py-4 text-slate-500 record-font text-[12px] min-px text-center">${r["10k"]}</td><td class="py-4 text-slate-500 record-font text-[12px] min-px text-center">${r["half"]}</td><td class="py-4 text-slate-900 record-font text-[13px] font-black min-px text-center">${r["full"]}</td>${actionBtns}</tr>`; 
            }); 
        }

        function sortRecords(key) { sortDir = (sortKey === key) ? sortDir * -1 : 1; sortKey = key; renderRecords(); }
        function openAddRecordModal() { document.getElementById('rec-modal-title').innerText = "PB 기록 추가"; document.getElementById('rec-name').value = ""; document.getElementById('rec-name').disabled = false; ['5k','10k','half','full'].forEach(id => document.getElementById(`rec-${id}`).value = ""); document.getElementById('add-record-modal').classList.remove('hidden'); }
        function closeAddRecordModal() { document.getElementById('add-record-modal').classList.add('hidden'); }
        function editAnyPBRecord(name) { const pb = getUnifiedPBData().find(r => r.name === name); if(!pb) return; document.getElementById('rec-modal-title').innerText = "PB 기록 수정"; document.getElementById('rec-name').value = name; document.getElementById('rec-name').disabled = true; ['5k','10k','half','full'].forEach(k => document.getElementById(`rec-${k}`).value = pb[k] === "-" ? "" : pb[k]); document.getElementById('add-record-modal').classList.remove('hidden'); }
        async function deleteAnyPBRecord(name) { if(!confirm(`${name}님의 기록을 삭제하시겠습니까?`)) return; if(prompt("삭제 비밀번호") !== MASTER_PW) return; const paths = ["pb", "2026", "2025", "prev"]; for (const p of paths) { const records = allData.records?.[p] || {}; const targetKey = Object.keys(records).find(k => k.trim() === name.trim()); if (targetKey) { await fetch(`${DB_URL}/records/${p}/${encodeURIComponent(targetKey)}.json`, { method: 'DELETE' }); } } fetchData(); }
        async function saveUserRecord() { const name = document.getElementById('rec-name').value.trim(); if (!name) return alert("이름을 입력하세요!"); const paths = ["pb", "2026", "2025", "prev"]; for (const p of paths) { const records = allData.records?.[p] || {}; const oldKey = Object.keys(records).find(k => k.trim() === name); if (oldKey) await fetch(`${DB_URL}/records/${p}/${encodeURIComponent(oldKey)}.json`, { method: 'DELETE' }); } await fetch(`${DB_URL}/records/pb/${encodeURIComponent(name)}.json`, { method: 'PUT', body: JSON.stringify({ "5k": document.getElementById('rec-5k').value || "-", "10k": document.getElementById('rec-10k').value || "-", "half": document.getElementById('rec-half').value || "-", "full": document.getElementById('rec-full').value || "-" }) }); closeAddRecordModal(); fetchData(); }

        function formatRecord(input, type) { let val = input.value.replace(/[^0-9]/g, ""); let formatted = ""; if (type === 'short') { if (val.length > 2) formatted = val.slice(0, 2) + ":" + val.slice(2, 4); else formatted = val; } else { if (val.length > 5) formatted = val.slice(0, 1) + ":" + val.slice(1, 3) + ":" + val.slice(3, 5); else if (val.length > 3) formatted = val.slice(0, 1) + ":" + val.slice(1, 3) + ":" + val.slice(3); else if (val.length > 1) formatted = val.slice(0, 1) + ":" + val.slice(1); else formatted = val; } input.value = formatted; }
        function moveMonth(offset) { currentMonth += offset; if (currentMonth > 12) { currentMonth = 1; currentYear++; } else if (currentMonth < 1) { currentMonth = 12; currentYear--; } document.getElementById('month-select').value = currentMonth; changeMonth(); }
        function changeMonth() { currentMonth = parseInt(document.getElementById('month-select').value); selectedDate = null; renderAll(); }
        function initMonthSelect() { const select = document.getElementById('month-select'); select.innerHTML = ''; for(let i=1; i<=12; i++) { const opt = document.createElement('option'); opt.value = i; opt.innerText = i + '월'; if(i === currentMonth) opt.selected = true; select.appendChild(opt); } }
        function renderAll() { renderCalendar(); renderMajorCards(); }
        function renderCalendar() { const container = document.getElementById('calendar-days'); container.innerHTML = ''; const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay(); const lastDate = new Date(currentYear, currentMonth, 0).getDate(); for(let i=0; i<firstDay; i++) container.innerHTML += `<div></div>`; for(let i=1; i<=lastDate; i++) { const dateStr = `${currentYear}-${currentMonth}-${i}`; const racesForDay = Object.values(allData.races || {}).filter(r => isSameDate(r.date, dateStr)); let hasRace = racesForDay.some(r => r.courses && r.courses.some(c => c !== "기타")); let hasEvent = racesForDay.some(r => r.courses && r.courses.length === 1 && r.courses[0] === "기타"); const now = new Date(); const todayStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`; let isToday = isSameDate(dateStr, todayStr); let isSelected = isSameDate(dateStr, selectedDate); let bgStyle = isToday ? "bg-yellow-400 text-slate-900" : (isSelected ? "bg-slate-200 text-slate-900" : ""); container.innerHTML += `<div onclick="showDayDetail('${dateStr}', false)" class="h-10 flex flex-col items-center justify-center cursor-pointer font-black"><span class="${bgStyle} rounded-lg w-8 h-8 flex items-center justify-center text-sm shadow-sm">${i}</span><div class="flex gap-0.5 justify-center">${hasRace ? '<span class="dot-red"></span>' : ''}${hasEvent ? '<span class="dot-blue"></span>' : ''}</div></div>`; } }
        function renderMajorCards() { const container = document.getElementById('major-races'); container.innerHTML = ''; const now = new Date(); const todayStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`; const sortedRaces = Object.entries(allData.races || {}).sort((a, b) => { const partsA = a[1].date.split('-').map(v => parseInt(v)); const partsB = b[1].date.split('-').map(v => parseInt(v)); return (partsA[0]-partsB[0]) || (partsA[1]-partsB[1]) || (partsA[2]-partsB[2]); }); let firstFutureIndex = -1; sortedRaces.forEach(([id, race], index) => { const isEventOnly = race.courses && race.courses.length === 1 && race.courses[0] === "기타"; const nowParts = todayStr.split('-').map(Number); const raceParts = race.date.split('-').map(Number); const isPast = (raceParts[0] < nowParts[0]) || (raceParts[0] === nowParts[0] && raceParts[1] < nowParts[1]) || (raceParts[0] === nowParts[0] && raceParts[1] === nowParts[1] && raceParts[2] < nowParts[2]); if (firstFutureIndex === -1 && !isPast) firstFutureIndex = index; container.innerHTML += `<div id="card-${index}" onclick="showDayDetail('${race.date}', true)" class="min-w-[140px] bg-white p-4 rounded-[1rem] shadow-sm border border-slate-100 flex-shrink-0 font-black uppercase ${isPast ? 'opacity-40' : ''}"><p class="text-[9px] ${isEventOnly ? 'text-blue-500' : 'text-yellow-500'} mb-1 font-bold text-left">${isEventOnly ? 'EVENT' : 'RACE'}</p><h4 class="text-slate-800 truncate text-[11px] font-bold text-left">${race.name}</h4><p class="text-[9px] text-slate-400 mt-1 text-left font-bold">${race.date}</p></div>`; }); if (firstFutureIndex !== -1) setTimeout(() => { const card = document.getElementById(`card-${firstFutureIndex}`); if (card) container.scrollLeft = card.offsetLeft - 20; }, 100); }
        function showDayDetail(dateStr, shouldScroll) { selectedDate = dateStr; const container = document.getElementById('race-list-for-day'); const detailSection = document.getElementById('day-detail'); const pts = dateStr.split('-'); document.getElementById('selected-date-label').innerText = `${pts[0]}-${pts[1].padStart(2,'0')}-${pts[2].padStart(2,'0')}`; container.innerHTML = ''; renderCalendar(); const dayRaces = Object.entries(allData.races || {}).filter(([id, r]) => isSameDate(r.date, selectedDate)); if(dayRaces.length > 0) { detailSection.classList.remove('hidden'); dayRaces.forEach(([id, race], idx) => { const pList = Object.entries(allData.participants || {}).filter(([pid, p]) => p.raceId === id).sort((a, b) => a[1].name.localeCompare(b[1].name, 'ko')); const isEventOnly = (race.courses && race.courses.length === 1 && race.courses[0] === "기타"); container.innerHTML += `<div id="target-${idx}" class="bg-white rounded-[1rem] p-6 shadow-sm border border-slate-100 border-t-[4px] ${isEventOnly ? 'border-t-blue-400' : 'border-t-yellow-400'} scroll-mt-4 text-left font-bold"><div class="flex justify-between items-start mb-1 font-black"><h4 class="text-lg text-slate-800 leading-tight uppercase font-black text-left">${race.name}</h4><div class="flex gap-2"><button onclick="editRace('${id}')" class="text-[9px] text-slate-400 font-black uppercase">Edit</button><button onclick="deleteRace('${id}')" class="text-[9px] text-red-400 font-black uppercase">Del</button><button onclick="openJoinModal('${id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg ml-2 uppercase">Join</button></div></div>${race.url ? `<a href="${race.url}" target="_blank" class="text-[10px] text-blue-500 font-black underline block mb-1 uppercase">🔗 대회 홈페이지</a>` : ''}${race.chatUrl ? `<a href="${race.chatUrl}" target="_blank" class="text-[10px] text-green-600 font-black underline block mb-2 uppercase">💬 오픈채팅방</a>` : ''}<p class="text-[10px] text-slate-400 mb-4 uppercase font-black text-left">${race.courses.join(' / ')}</p><div class="bg-slate-50 rounded-[1rem] p-4 border border-slate-100"><p class="text-[9px] font-black text-slate-300 mb-3 uppercase tracking-widest text-left">Team Runners (${pList.length})</p><div class="space-y-3">${pList.map(([pid, p]) => `<div class="flex justify-between items-center text-sm font-bold"><span class="font-black text-slate-700">${p.name} <small class="text-slate-400 ml-1 uppercase">${p.gender}</small></span><div class="flex items-center gap-3"><span class="bg-yellow-200 text-slate-800 px-2 py-0.5 rounded-lg font-black text-[9px] uppercase">${p.course}</span><button onclick="deleteParticipant('${pid}')" class="text-red-300 font-black text-lg">×</button></div></div>`).join('')}</div></div></div>`; }); if (shouldScroll) setTimeout(() => { const target = document.getElementById(`target-0`); if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50); } else detailSection.classList.add('hidden'); }
        function checkAdminPassword() { const pw = prompt("Admin 비밀번호"); if (pw === ADMIN_PW) openAdminModal(); else if(pw) alert("틀림"); }
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        function openRaceModal() { editingRaceId = null; document.getElementById('race-modal-title').innerText = "New Race"; ['new-race-name','new-race-url','new-chat-url','new-race-date'].forEach(id => document.getElementById(id).value=""); document.querySelectorAll('#course-checks input').forEach(c => c.checked = false); document.getElementById('race-modal').classList.remove('hidden'); }
        function closeRaceModal() { document.getElementById('race-modal').classList.add('hidden'); }
        let editingRaceId = null; let activeRaceId = null;
        function editRace(id) { editingRaceId = id; const r = allData.races[id]; document.getElementById('race-modal-title').innerText = "Edit Race"; document.getElementById('new-race-name').value = r.name; document.getElementById('new-race-url').value = r.url || ""; document.getElementById('new-chat-url').value = r.chatUrl || ""; document.getElementById('new-race-date').value = r.date; document.querySelectorAll('#course-checks input').forEach(c => c.checked = r.courses.includes(c.value)); document.getElementById('race-modal').classList.remove('hidden'); }
        async function saveRace() { const n = document.getElementById('new-race-name').value; const d = document.getElementById('new-race-date').value; const cs = Array.from(document.querySelectorAll('#course-checks input:checked')).map(cb => cb.value); if(!n || !d || cs.length === 0) return alert('필수 입력'); const ext = editingRaceId ? `races/${editingRaceId}.json` : 'races.json'; await fetch(`${DB_URL}/${ext}`, { method: editingRaceId ? 'PATCH' : 'POST', body: JSON.stringify({ name:n, url:document.getElementById('new-race-url').value, chatUrl:document.getElementById('new-chat-url').value, date:d, courses:cs }) }); selectedDate = d; closeRaceModal(); fetchData(); }
        async function deleteRace(id) { if(prompt("삭제 암호") !== MASTER_PW) return; await fetch(`${DB_URL}/races/${id}.json`, { method: 'DELETE' }); selectedDate = null; fetchData(); }
        function openJoinModal(id) { activeRaceId = id; const r = allData.races[id]; document.getElementById('join-race-title').innerText = r.name; document.getElementById('join-race-date').innerText = r.date; const s = document.getElementById('user-course'); s.innerHTML = `<option value="">코스 선택</option>${r.courses.map(c => `<option value="${c}">${c}</option>`).join('')}<option value="응원">응원</option>`; document.getElementById('join-modal').classList.remove('hidden'); }
        function closeJoinModal() { document.getElementById('join-modal').classList.add('hidden'); }
        async function addParticipant() { const n = document.getElementById('user-name').value; const c = document.getElementById('user-course').value; if(!n || !c) return; await fetch(`${DB_URL}/participants.json`, { method: 'POST', body: JSON.stringify({ raceId: activeRaceId, name: n, gender: document.querySelector('input[name="gender"]:checked').value, course: c }) }); closeJoinModal(); fetchData(); }
        async function deleteParticipant(pid) { if(prompt("삭제 암호") !== MASTER_PW) return; await fetch(`${DB_URL}/participants/${pid}.json`, { method: 'DELETE' }); fetchData(); }
        async function importData() { const raw = document.getElementById('bulk-json-input').value; if(!raw) return; try { const d = JSON.parse(raw); if(confirm("업로드?")) { await fetch(`${DB_URL}/.json`, { method: 'PUT', body: JSON.stringify(d) }); location.reload(); } } catch(e) { alert("오류"); } }
        function exportData() { let csv = "\ufeff구분,이름,날짜/코스,URL\n"; Object.values(allData.races || {}).forEach(r => csv += `대회,${r.name},${r.date},${r.url}\n`); const b = new Blob([csv], { type: 'text/csv' }); const l = document.createElement("a"); l.href = URL.createObjectURL(blob); l.download = "daltokki.csv"; l.click(); }
    </script>
</body>
</html>
