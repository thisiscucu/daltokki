<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>1987 DALTOKKI</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <meta name="theme-color" content="#0f172a"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f3f4f6; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .dot { height: 5px; width: 5px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-top: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input[type="date"] { position: relative; }
        input[type="date"]::before {
            content: "📅 대회 날짜 선택하기";
            position: absolute; left: 1rem; color: #94a3b8; width: 80%; pointer-events: none;
        }
        input[type="date"]:focus::before,
        input[type="date"]:valid::before { display: none; }
        
        .scroll-mt-4 { scroll-margin-top: 1rem; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-900 text-white p-3.5 rounded-b-[1rem] shadow-xl font-bold overflow-hidden">
        <div onclick="location.reload()" class="cursor-pointer mb-1 text-left">
            <h1 class="text-2xl font-black italic tracking-tighter text-yellow-400 leading-none whitespace-nowrap">1987 DALTOKKI</h1>
        </div>
        <p class="text-slate-400 text-[8px] uppercase tracking-tight font-bold whitespace-nowrap">
            <span onclick="checkAdminPassword()" class="cursor-default">When</span> The Moon Rises, We Run
        </p>
    </header>

    <section class="mt-4 px-4">
        <div class="flex space-x-3 overflow-x-auto pb-2 no-scrollbar scroll-smooth" id="major-races"></div>
    </section>

    <section class="mx-4 bg-white rounded-[1rem] shadow-sm p-5 mt-1 border border-slate-100 font-bold">
        <div class="flex justify-between items-center mb-5 gap-2">
            <h2 id="calendar-title" class="font-black text-lg text-slate-800 tracking-tight shrink-0">Schedule</h2>
            <div class="flex items-center justify-center gap-1.5">
                <button onclick="moveMonth(-1)" class="text-yellow-500 px-1 text-xl font-bold">◀</button>
                <select id="month-select" onchange="changeMonth()" class="bg-slate-50 text-slate-800 border-none rounded-lg px-2.5 py-1.5 outline-none text-sm font-black text-center shadow-inner"></select>
                <button onclick="moveMonth(1)" class="text-yellow-500 px-1 text-xl font-bold">▶</button>
            </div>
            <button onclick="openRaceModal()" class="bg-yellow-400 text-slate-900 px-3 py-1.5 rounded-full text-[9px] font-black shadow-md uppercase tracking-tighter shrink-0">Add Race</button>
        </div>
        <div class="calendar-grid text-center text-[10px] font-bold text-slate-300 mb-3 uppercase tracking-widest">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-days" class="calendar-grid text-center gap-y-4 text-base font-black text-slate-600"></div>
    </section>

    <section id="day-detail" class="px-4 mt-4 hidden">
        <h3 id="selected-date-label" class="text-[10px] font-black text-slate-400 mb-2 px-2 uppercase tracking-widest font-bold">Event Date</h3>
        <div id="race-list-for-day" class="space-y-4"></div>
    </section>

    <div id="admin-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-md rounded-[1rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-black mb-4 text-slate-800 uppercase tracking-tighter">Data Manager</h2>
            <textarea id="bulk-json-input" placeholder='JSON 데이터를 붙여넣으세요...' class="w-full h-48 bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-[10px] font-mono shadow-inner"></textarea>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="importData()" class="bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg font-bold">Import</button>
                <button onclick="exportData()" class="bg-yellow-400 text-slate-900 py-4 rounded-xl font-black text-xs uppercase shadow-lg font-bold">Export</button>
            </div>
            <button onclick="closeAdminModal()" class="w-full py-2 font-black text-slate-400 text-xs uppercase font-bold">Close</button>
        </div>
    </div>

    <div id="race-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[1rem] p-8 shadow-2xl">
            <h2 id="race-modal-title" class="text-xl font-black mb-6 text-slate-800 uppercase">New Race</h2>
            <input type="text" id="new-race-name" placeholder="대회 명칭" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-base font-bold shadow-inner">
            <input type="text" id="new-race-url" placeholder="대회 홈페이지 URL" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-base font-bold shadow-inner">
            <input type="text" id="new-chat-url" placeholder="오픈채팅방 URL" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-3 outline-none text-base font-bold shadow-inner">
            <input type="date" id="new-race-date" required class="w-full bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-base font-black shadow-inner">
            <div class="flex flex-wrap gap-2 mb-6" id="course-checks">
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="5K"> 5K</label>
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="10K"> 10K</label>
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="Half"> Half</label>
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="Full"> Full</label>
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="Trail"> Trail</label>
                <label class="bg-slate-50 px-3 py-2 rounded-lg text-xs font-black text-slate-600 border border-slate-100 font-bold"><input type="checkbox" value="기타"> 기타</label>
            </div>
            <div class="flex gap-3">
                <button onclick="closeRaceModal()" class="flex-1 py-4 font-black text-slate-400 text-sm uppercase">Cancel</button>
                <button onclick="saveRace()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg text-sm uppercase font-bold">Save</button>
            </div>
        </div>
    </div>

    <div id="join-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[1rem] p-8 shadow-2xl">
            <h2 id="join-race-title" class="text-xl font-black mb-1 text-slate-800">Runner Info</h2>
            <p id="join-race-date" class="text-xs text-slate-400 mb-6 font-black"></p>
            <input type="text" id="user-name" placeholder="이름" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-4 outline-none text-base font-bold shadow-inner font-bold">
            <div class="flex gap-8 mb-6 font-black text-sm">
                <label><input type="radio" name="gender" value="남" checked class="mr-2 accent-slate-900 font-bold">남성</label>
                <label><input type="radio" name="gender" value="여" class="mr-2 accent-slate-900 font-bold">여성</label>
            </div>
            <select id="user-course" class="w-full bg-slate-50 border-none p-4 rounded-lg mb-8 outline-none text-slate-500 text-base font-black uppercase shadow-inner font-bold"></select>
            <div class="flex gap-3">
                <button onclick="closeJoinModal()" class="flex-1 py-4 font-black text-slate-400 text-sm uppercase font-bold">Cancel</button>
                <button onclick="addParticipant()" class="flex-1 bg-yellow-400 text-slate-900 py-4 rounded-xl font-black shadow-lg text-sm uppercase font-black">Register</button>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://runcal-80d30-default-rtdb.firebaseio.com"; 
        const MASTER_PW = "1987";
        const ADMIN_PW = "0248";

        let allData = { races: {}, participants: {} };
        let currentYear = 2026;
        let currentMonth = new Date().getMonth() + 1;
        let selectedDate = null;

        window.onload = () => { initMonthSelect(); fetchData(); };

        function checkAdminPassword() {
            const pw = prompt("Admin 비밀번호를 입력하세요.");
            if (pw === ADMIN_PW) openAdminModal();
            else if (pw !== null) alert("비밀번호가 틀렸습니다.");
        }

        function initMonthSelect() {
            const select = document.getElementById('month-select');
            select.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const opt = document.createElement('option'); opt.value = i; opt.innerText = i + '월';
                if(i === currentMonth) opt.selected = true; select.appendChild(opt);
            }
        }

        async function fetchData(keepView = false) {
            const res = await fetch(`${DB_URL}/.json`);
            const data = await res.json();
            allData = data || { races: {}, participants: {} };
            renderAll();
            
            // 💡 1. 수정한 날짜가 있다면 해당 날짜의 박스를 다시 띄워줍니다.
            if(keepView && selectedDate) {
                showDayDetail(selectedDate, false);
            }
        }

        function changeMonth() {
            currentMonth = parseInt(document.getElementById('month-select').value);
            selectedDate = null; // 달을 바꾸면 선택 해제
            fetchData();
        }

        function moveMonth(offset) {
            currentMonth += offset;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            document.getElementById('month-select').value = currentMonth;
            changeMonth();
        }

        function renderAll() { renderCalendar(); renderMajorCards(); }

        function renderCalendar() {
            const container = document.getElementById('calendar-days'); container.innerHTML = '';
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth, 0).getDate();
            for(let i=0; i<firstDay; i++) container.innerHTML += `<div></div>`;
            for(let i=1; i<=lastDate; i++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasRace = Object.values(allData.races || {}).some(r => r.date === dateStr);
                const isToday = (i === new Date().getDate() && currentMonth === new Date().getMonth()+1);
                const isSelected = (dateStr === selectedDate);
                
                container.innerHTML += `
                    <div onclick="showDayDetail('${dateStr}', false)" class="h-10 flex flex-col items-center justify-center cursor-pointer font-bold">
                        <span class="${isToday ? 'bg-yellow-400 text-slate-900 rounded-lg w-8 h-8 flex items-center justify-center font-black shadow-sm text-sm' : (isSelected ? 'border-2 border-yellow-400 rounded-lg w-8 h-8 flex items-center justify-center text-sm' : 'text-sm')}">${i}</span>
                        ${hasRace ? '<span class="dot"></span>' : ''}
                    </div>`;
            }
        }

        function renderMajorCards() {
            const container = document.getElementById('major-races'); container.innerHTML = '';
            const todayStr = new Date().toISOString().split('T')[0];
            const sortedRaces = Object.entries(allData.races || {}).sort((a, b) => a[1].date.localeCompare(b[1].date));

            if(sortedRaces.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-[10px] px-2 font-bold uppercase tracking-tight">No races yet.</p>`; return;
            }

            let firstFutureIndex = -1;
            sortedRaces.forEach(([id, race], index) => {
                const isPast = race.date < todayStr;
                if (firstFutureIndex === -1 && !isPast) firstFutureIndex = index;

                container.innerHTML += `
                    <div id="card-${index}" onclick="showDayDetail('${race.date}', true)" class="min-w-[140px] bg-white p-4 rounded-[1rem] shadow-sm border border-slate-100 flex-shrink-0 font-black uppercase ${isPast ? 'opacity-40' : ''}">
                        <p class="text-[9px] text-yellow-500 mb-1 font-bold">RACE</p>
                        <h4 class="text-slate-800 truncate text-[11px] font-bold">${race.name}</h4>
                        <p class="text-[9px] text-slate-400 mt-1 font-black font-bold text-xs">${race.date}</p>
                    </div>`;
            });

            if (firstFutureIndex !== -1) {
                setTimeout(() => {
                    const firstFutureCard = document.getElementById(`card-${firstFutureIndex}`);
                    if (firstFutureCard) container.scrollLeft = firstFutureCard.offsetLeft - 20;
                }, 100);
            }
        }

        function showDayDetail(dateStr, shouldScroll) {
            selectedDate = dateStr; 
            const [y, m, d] = dateStr.split('-').map(Number);
            if (m !== currentMonth || y !== currentYear) {
                currentYear = y; currentMonth = m;
                document.getElementById('month-select').value = currentMonth;
                fetchData(true); // 달이 바뀐 경우 데이터를 새로 불러오되 뷰 유지
                return;
            } 
            
            renderCalendar();
            const container = document.getElementById('race-list-for-day'); 
            document.getElementById('selected-date-label').innerText = dateStr;
            container.innerHTML = ''; 
            const dayRaces = Object.entries(allData.races || {}).filter(([id, r]) => r.date === dateStr);
            
            if(dayRaces.length > 0) {
                dayRaces.forEach(([id, race], idx) => {
                    const pList = Object.entries(allData.participants || {})
                        .filter(([pid, p]) => p.raceId === id)
                        .sort((a, b) => a[1].name.localeCompare(b[1].name, 'ko'));

                    const rawUrl = race.url ? race.url.trim() : ""; const formattedUrl = (rawUrl && !/^https?:\/\//i.test(rawUrl)) ? `https://${rawUrl}` : rawUrl;
                    const urlLink = formattedUrl ? `<a href="${formattedUrl}" target="_blank" class="text-[10px] text-blue-500 font-black underline block mb-1 font-bold uppercase tracking-widest text-xs font-black">🔗 대회 홈페이지</a>` : '';
                    const rawChatUrl = race.chatUrl ? race.chatUrl.trim() : ""; const formattedChatUrl = (rawChatUrl && !/^https?:\/\//i.test(rawChatUrl)) ? `https://${rawChatUrl}` : rawChatUrl;
                    const chatLink = formattedChatUrl ? `<a href="${formattedChatUrl}" target="_blank" class="text-[10px] text-green-600 font-black underline block mb-2 font-bold uppercase tracking-widest text-xs font-black">💬 오픈채팅방 바로가기</a>` : '';

                    container.innerHTML += `
                        <div id="target-${dateStr}-${idx}" class="bg-white rounded-[1rem] p-6 shadow-sm border border-slate-100 border-t-[4px] border-t-yellow-400 scroll-mt-4">
                            <div class="flex justify-between items-start mb-1 font-black font-bold">
                                <h4 class="text-lg text-slate-800 leading-tight tracking-tight uppercase font-bold">${race.name}</h4>
                                <div class="flex gap-2">
                                    <button onclick="editRace('${id}')" class="text-[9px] text-slate-400 font-black uppercase font-bold text-xs">Edit</button>
                                    <button onclick="deleteRace('${id}')" class="text-[9px] text-red-400 font-black uppercase font-bold text-xs">Del</button>
                                    <button onclick="openJoinModal('${id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg ml-2 uppercase font-bold text-xs">Join</button>
                                </div>
                            </div>
                            ${urlLink}${chatLink}
                            <p class="text-[10px] text-slate-400 mb-4 uppercase font-black tracking-widest font-bold text-xs">${race.courses.join(' / ')}</p>
                            <div class="bg-slate-50 rounded-[1rem] p-4 border border-slate-100 font-bold">
                                <p class="text-[9px] font-black text-slate-300 mb-3 uppercase tracking-widest font-bold text-xs">Team Runners (${pList.length})</p>
                                <div class="space-y-3 font-black">
                                    ${pList.map(([pid, p]) => `<div class="flex justify-between items-center text-sm font-bold font-black"><span class="font-black text-slate-700">${p.name} <small class="text-slate-400 font-bold ml-1 uppercase text-xs font-bold">${p.gender}</small></span><div class="flex items-center gap-3"><span class="bg-yellow-200 text-slate-800 px-2 py-0.5 rounded-lg font-black text-[9px] uppercase font-bold text-xs">${p.course}</span><button onclick="deleteParticipant('${pid}')" class="text-red-300 font-black text-lg leading-none font-bold">×</button></div></div>`).join('')}
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('day-detail').classList.remove('hidden'); 
                
                if (shouldScroll) {
                    setTimeout(() => {
                        const targetBox = document.getElementById(`target-${dateStr}-0`);
                        if (targetBox) targetBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 50);
                }
            }
        }

        // --- 관리 함수들 (페이지 새로고침 대신 fetchData(true) 사용) ---
        async function saveRace() {
            const name = document.getElementById('new-race-name').value;
            const url = document.getElementById('new-race-url').value;
            const chatUrl = document.getElementById('new-chat-url').value;
            const date = document.getElementById('new-race-date').value;
            const courses = Array.from(document.querySelectorAll('#course-checks input:checked')).map(cb => cb.value);
            if(!name || !date || courses.length === 0) return alert('필수 입력!');
            const url_ext = editingRaceId ? `races/${editingRaceId}.json` : 'races.json';
            
            // 💡 2. 저장 후 새로고침 대신 선택된 날짜 뷰를 유지하도록 수정
            await fetch(`${DB_URL}/${url_ext}`, { method: editingRaceId ? 'PATCH' : 'POST', body: JSON.stringify({ name, url, chatUrl, date, courses }) });
            selectedDate = date; // 방금 수정한 날짜를 타겟으로 설정
            closeRaceModal();
            fetchData(true); 
        }

        async function addParticipant() {
            const name = document.getElementById('user-name').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const course = document.getElementById('user-course').value;
            if(!name || !course) return;
            
            await fetch(`${DB_URL}/participants.json`, { method: 'POST', body: JSON.stringify({ raceId: activeRaceId, name, gender, course }) });
            closeJoinModal();
            fetchData(true); // 💡 참여 후에도 보던 화면 유지
        }

        async function deleteParticipant(pid) {
            if(prompt("삭제 암호") !== MASTER_PW) return;
            await fetch(`${DB_URL}/participants/${pid}.json`, { method: 'DELETE' });
            fetchData(true); // 💡 삭제 후에도 보던 화면 유지
        }

        async function deleteRace(id) {
            if(prompt("삭제 암호") !== MASTER_PW) return;
            await fetch(`${DB_URL}/races/${id}.json`, { method: 'DELETE' });
            selectedDate = null; // 대회가 삭제되었으므로 뷰 해제
            fetchData();
        }

        // --- 모달 관리 ---
        let editingRaceId = null;
        let activeRaceId = null;
        function openRaceModal() { editingRaceId = null; document.getElementById('race-modal-title').innerText = "New Race"; document.getElementById('new-race-name').value = ""; document.getElementById('new-race-url').value = ""; document.getElementById('new-chat-url').value = ""; document.getElementById('new-race-date').value = ""; document.querySelectorAll('#course-checks input').forEach(c => c.checked = false); document.getElementById('race-modal').classList.remove('hidden'); }
        function closeRaceModal() { document.getElementById('race-modal').classList.add('hidden'); }
        function editRace(id) { editingRaceId = id; const race = allData.races[id]; document.getElementById('race-modal-title').innerText = "Edit Race"; document.getElementById('new-race-name').value = race.name; document.getElementById('new-race-url').value = race.url || ""; document.getElementById('new-chat-url').value = race.chatUrl || ""; document.getElementById('new-race-date').value = race.date; document.querySelectorAll('#course-checks input').forEach(c => c.checked = race.courses.includes(c.value)); document.getElementById('race-modal').classList.remove('hidden'); }
        function openJoinModal(id) { activeRaceId = id; const race = allData.races[id]; document.getElementById('join-race-title').innerText = race.name; document.getElementById('join-race-date').innerText = race.date; const select = document.getElementById('user-course'); select.innerHTML = '<option value="">코스 선택</option>'; race.courses.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`); select.innerHTML += `<option value="응원">응원</option>`; document.getElementById('join-modal').classList.remove('hidden'); }
        function closeJoinModal() { document.getElementById('join-modal').classList.add('hidden'); }
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        async function importData() { const raw = document.getElementById('bulk-json-input').value; if(!raw) return; try { const data = JSON.parse(raw); if(confirm("업로드할까요?")) { await fetch(`${DB_URL}/.json`, { method: 'PUT', body: JSON.stringify(data) }); location.reload(); } } catch(e) { alert("JSON 형식 오류"); } }
        function exportData() { let csv = "구분,이름,날짜/코스,URL\n"; Object.values(allData.races || {}).forEach(r => csv += `대회,${r.name},${r.date},${r.url}\n`); Object.values(allData.participants || {}).forEach(p => csv += `참여자,${p.name},${p.course},${p.gender}\n`); const blob = new Blob(["\ufeff" + csv], { type: 'text/csv' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "daltokki.csv"; link.click(); }
    </script>
</body>
</html>
